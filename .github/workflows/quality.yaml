name: Quality
on:
    pull_request:
    push:
        branches: [main]

env:
    node-version: 20.11.1

jobs:
    lint:
        name: lint
        runs-on: ubuntu-latest
        timeout-minutes: 10
        env:
            NODE_OPTIONS: --max-old-space-size=8192
        steps:
            - name: Checkout to git repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.node-version }}

            - name: Enable Corepack
              run: corepack enable

            - name: Yarn cache
              uses: actions/cache@v4
              with:
                  path: ./.yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Run install
              uses: borales/actions-yarn@v5
              with:
                  cmd: install

            - name: Run lint
              uses: borales/actions-yarn@v5
              with:
                  cmd: lint

    typecheck:
        name: typecheck
        runs-on: ubuntu-latest
        timeout-minutes: 15
        steps:
            - name: Checkout to git repository
              uses: actions/checkout@v4

            - name: Set up Node
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ env.node-version }}

            - name: Enable Corepack
              run: corepack enable

            - name: Yarn cache
              uses: actions/cache@v4
              with:
                  path: ./.yarn
                  key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
                  restore-keys: |
                      ${{ runner.os }}-yarn-

            - name: Run install
              uses: borales/actions-yarn@v5
              with:
                  cmd: install

            - name: Build shared packages
              uses: borales/actions-yarn@v5
              with:
                  cmd: build:pkg

            - name: Run typecheck
              uses: borales/actions-yarn@v5
              with:
                  cmd: typecheck
